trigger:
  branches:
    include:
      - main

variables:
  ACR_NAME: acrcloudshopabdou
  RESOURCE_GROUP: rg-cloudshop-dev

stages:
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.11'

          - script: |
              pip install -r services/catalog/requirements.txt
              pip install pytest httpx
              cd services/catalog
              python -m pytest --tb=short || true
            displayName: Test catalog service

          - task: Docker@2
            displayName: Build catalog image
            inputs:
              command: build
              dockerfile: services/catalog/Dockerfile
              repository: $(ACR_NAME).azurecr.io/catalog
              tags: $(Build.SourceVersion)

          - task: Docker@2
            displayName: Build cart image
            inputs:
              command: build
              dockerfile: services/cart/Dockerfile
              repository: $(ACR_NAME).azurecr.io/cart
              tags: $(Build.SourceVersion)

          - task: Docker@2
            displayName: Build orders image
            inputs:
              command: build
              dockerfile: services/orders/Dockerfile
              repository: $(ACR_NAME).azurecr.io/orders
              tags: $(Build.SourceVersion)

          - task: Docker@2
            displayName: Build auth image
            inputs:
              command: build
              dockerfile: services/auth/Dockerfile
              repository: $(ACR_NAME).azurecr.io/auth
              tags: $(Build.SourceVersion)

  - stage: Deploy
    displayName: Push & Deploy to Azure
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: Deploy
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureCLI@2
            displayName: Login to ACR & Push images
            inputs:
              azureSubscription: 'cloudshop-service-connection'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)
                docker build -t $(ACR_NAME).azurecr.io/catalog:$(Build.SourceVersion) services/catalog
                docker build -t $(ACR_NAME).azurecr.io/cart:$(Build.SourceVersion) services/cart
                docker build -t $(ACR_NAME).azurecr.io/orders:$(Build.SourceVersion) services/orders
                docker build -t $(ACR_NAME).azurecr.io/auth:$(Build.SourceVersion) services/auth
                docker push $(ACR_NAME).azurecr.io/catalog:$(Build.SourceVersion)
                docker push $(ACR_NAME).azurecr.io/cart:$(Build.SourceVersion)
                docker push $(ACR_NAME).azurecr.io/orders:$(Build.SourceVersion)
                docker push $(ACR_NAME).azurecr.io/auth:$(Build.SourceVersion)

          - task: AzureCLI@2
            displayName: Deploy to Container Apps
            inputs:
              azureSubscription: 'cloudshop-service-connection'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az containerapp update --name ca-catalog --resource-group $(RESOURCE_GROUP) --image $(ACR_NAME).azurecr.io/catalog:$(Build.SourceVersion)
                az containerapp update --name ca-cart --resource-group $(RESOURCE_GROUP) --image $(ACR_NAME).azurecr.io/cart:$(Build.SourceVersion)
                az containerapp update --name ca-orders --resource-group $(RESOURCE_GROUP) --image $(ACR_NAME).azurecr.io/orders:$(Build.SourceVersion)
                az containerapp update --name ca-auth --resource-group $(RESOURCE_GROUP) --image $(ACR_NAME).azurecr.io/auth:$(Build.SourceVersion)

          - script: |
              echo "✅ Catalog: https://ca-catalog.wittyhill-85662d91.eastus.azurecontainerapps.io"
              echo "✅ Cart:    https://ca-cart.wittyhill-85662d91.eastus.azurecontainerapps.io"
              echo "✅ Orders:  https://ca-orders.wittyhill-85662d91.eastus.azurecontainerapps.io"
              echo "✅ Auth:    https://ca-auth.wittyhill-85662d91.eastus.azurecontainerapps.io"
            displayName: Print deployment URLs