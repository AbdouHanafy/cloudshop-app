name: CloudShop CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: acrcloudshopabdou
  RESOURCE_GROUP: rg-cloudshop-dev

jobs:
  # ─── JOB 1 : BUILD & TEST ─────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install catalog dependencies
        run: |
          pip install -r services/catalog/requirements.txt
          pip install pytest httpx

      - name: Test catalog service
        run: |
          cd services/catalog
          python -m pytest --tb=short || true

      - name: Install cart dependencies
        run: |
          pip install -r services/cart/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install orders dependencies
        run: |
          cd services/orders
          npm install

      - name: Install auth dependencies
        run: |
          cd services/auth
          npm install

      - name: Build Docker images
        run: |
          docker build -t $ACR_NAME.azurecr.io/catalog:${{ github.sha }} services/catalog
          docker build -t $ACR_NAME.azurecr.io/cart:${{ github.sha }} services/cart
          docker build -t $ACR_NAME.azurecr.io/orders:${{ github.sha }} services/orders
          docker build -t $ACR_NAME.azurecr.io/auth:${{ github.sha }} services/auth

  # ─── JOB 2 : PUSH & DEPLOY ────────────────────
  deploy:
    name: Push & Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build & Push images
        run: |
          docker build -t $ACR_NAME.azurecr.io/catalog:${{ github.sha }} services/catalog
          docker build -t $ACR_NAME.azurecr.io/cart:${{ github.sha }} services/cart
          docker build -t $ACR_NAME.azurecr.io/orders:${{ github.sha }} services/orders
          docker build -t $ACR_NAME.azurecr.io/auth:${{ github.sha }} services/auth

          docker push $ACR_NAME.azurecr.io/catalog:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/cart:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/orders:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/auth:${{ github.sha }}

      - name: Deploy Catalog to Container Apps
        run: |
          az containerapp update \
            --name ca-catalog \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/catalog:${{ github.sha }}

      - name: Deploy Cart to Container Apps
        run: |
          az containerapp update \
            --name ca-cart \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/cart:${{ github.sha }}

      - name: Deploy Orders to Container Apps
        run: |
          az containerapp update \
            --name ca-orders \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/orders:${{ github.sha }}

      - name: Deploy Auth to Container Apps
        run: |
          az containerapp update \
            --name ca-auth \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_NAME.azurecr.io/auth:${{ github.sha }}

      - name: Print deployment URLs
        run: |
          echo "✅ Catalog: https://ca-catalog.wittyhill-85662d91.eastus.azurecontainerapps.io"
          echo "✅ Cart:    https://ca-cart.wittyhill-85662d91.eastus.azurecontainerapps.io"
          echo "✅ Orders:  https://ca-orders.wittyhill-85662d91.eastus.azurecontainerapps.io"
          echo "✅ Auth:    https://ca-auth.wittyhill-85662d91.eastus.azurecontainerapps.io"