name: CloudShop Azure Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME || 'acrcloudshopabdou' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-cloudshop-dev' }}
  CATALOG_APP_NAME: ${{ vars.CATALOG_APP_NAME || 'ca-catalog' }}
  LEARNING_LIST_APP_NAME: ${{ vars.LEARNING_LIST_APP_NAME || 'ca-cart' }}
  ENROLLMENTS_APP_NAME: ${{ vars.ENROLLMENTS_APP_NAME || 'ca-orders' }}
  AUTH_APP_NAME: ${{ vars.AUTH_APP_NAME || 'ca-auth' }}
  REDIS_PORT: ${{ vars.REDIS_PORT || '6379' }}

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          pip install -r services/catalog/requirements.txt
          pip install -r services/cart/requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Check Python services
        run: python -m py_compile services/catalog/main.py services/cart/main.py

      - name: Check Node services
        run: |
          node --check services/auth/index.js
          node --check services/orders/index.js

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_CATALOG_API_URL: http://localhost:8000
          VITE_LEARNING_LIST_API_URL: http://localhost:8001
          VITE_ENROLLMENTS_API_URL: http://localhost:8002
          VITE_AUTH_API_URL: http://localhost:8003

      - name: Build backend Docker images
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/catalog:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/catalog:latest \
            services/catalog
          docker build \
            -t $ACR_NAME.azurecr.io/cart:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/cart:latest \
            services/cart
          docker build \
            -t $ACR_NAME.azurecr.io/orders:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/orders:latest \
            services/orders
          docker build \
            -t $ACR_NAME.azurecr.io/auth:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/auth:latest \
            services/auth

  deploy-backend:
    name: Deploy Backend To Azure Container Apps
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      catalog_url: ${{ steps.discover.outputs.catalog_url }}
      learning_list_url: ${{ steps.discover.outputs.learning_list_url }}
      enrollments_url: ${{ steps.discover.outputs.enrollments_url }}
      auth_url: ${{ steps.discover.outputs.auth_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          FRONTEND_ORIGIN: ${{ vars.FRONTEND_ORIGIN }}
          REDIS_HOST: ${{ vars.REDIS_HOST }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
        run: |
          for value in FRONTEND_ORIGIN REDIS_HOST DB_HOST DB_NAME DB_USER JWT_SECRET DB_PASSWORD AZURE_CREDENTIALS; do
            if [ -z "${!value}" ]; then
              echo "::error::$value is required for deployment"
              exit 1
            fi
          done

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Build and push backend images
        run: |
          docker build \
            -t $ACR_NAME.azurecr.io/catalog:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/catalog:latest \
            services/catalog
          docker build \
            -t $ACR_NAME.azurecr.io/cart:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/cart:latest \
            services/cart
          docker build \
            -t $ACR_NAME.azurecr.io/orders:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/orders:latest \
            services/orders
          docker build \
            -t $ACR_NAME.azurecr.io/auth:${{ github.sha }} \
            -t $ACR_NAME.azurecr.io/auth:latest \
            services/auth

          docker push $ACR_NAME.azurecr.io/catalog:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/catalog:latest
          docker push $ACR_NAME.azurecr.io/cart:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/cart:latest
          docker push $ACR_NAME.azurecr.io/orders:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/orders:latest
          docker push $ACR_NAME.azurecr.io/auth:${{ github.sha }}
          docker push $ACR_NAME.azurecr.io/auth:latest

      - name: Store secrets in Container Apps
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          az containerapp secret set \
            --name "$AUTH_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --secrets jwt-secret="$JWT_SECRET"

          az containerapp secret set \
            --name "$ENROLLMENTS_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --secrets db-password="$DB_PASSWORD"

      - name: Deploy catalog service
        run: |
          az containerapp update \
            --name "$CATALOG_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/catalog:${{ github.sha }}" \
            --set-env-vars CORS_ORIGINS="${{ vars.FRONTEND_ORIGIN }}"

      - name: Deploy learning-list service
        run: |
          az containerapp update \
            --name "$LEARNING_LIST_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/cart:${{ github.sha }}" \
            --set-env-vars \
              CORS_ORIGINS="${{ vars.FRONTEND_ORIGIN }}" \
              REDIS_HOST="${{ vars.REDIS_HOST }}" \
              REDIS_PORT="$REDIS_PORT"

      - name: Deploy enrollments service
        run: |
          az containerapp update \
            --name "$ENROLLMENTS_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/orders:${{ github.sha }}" \
            --set-env-vars \
              CORS_ORIGINS="${{ vars.FRONTEND_ORIGIN }}" \
              DB_HOST="${{ vars.DB_HOST }}" \
              DB_PORT="${{ vars.DB_PORT || '5432' }}" \
              DB_NAME="${{ vars.DB_NAME }}" \
              DB_USER="${{ vars.DB_USER }}" \
              DB_PASSWORD=secretref:db-password

      - name: Deploy auth service
        run: |
          az containerapp update \
            --name "$AUTH_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$ACR_NAME.azurecr.io/auth:${{ github.sha }}" \
            --set-env-vars \
              CORS_ORIGINS="${{ vars.FRONTEND_ORIGIN }}" \
              JWT_SECRET=secretref:jwt-secret

      - name: Discover backend URLs
        id: discover
        run: |
          echo "catalog_url=https://$(az containerapp show --name "$CATALOG_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)" >> "$GITHUB_OUTPUT"
          echo "learning_list_url=https://$(az containerapp show --name "$LEARNING_LIST_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)" >> "$GITHUB_OUTPUT"
          echo "enrollments_url=https://$(az containerapp show --name "$ENROLLMENTS_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)" >> "$GITHUB_OUTPUT"
          echo "auth_url=https://$(az containerapp show --name "$AUTH_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend To Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate frontend deployment token
        env:
          STATIC_WEB_APPS_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$STATIC_WEB_APPS_TOKEN" ]; then
            echo "::error::AZURE_STATIC_WEB_APPS_API_TOKEN is required for frontend deployment"
            exit 1
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
          app_build_command: npm run build
        env:
          VITE_CATALOG_API_URL: ${{ needs.deploy-backend.outputs.catalog_url }}
          VITE_LEARNING_LIST_API_URL: ${{ needs.deploy-backend.outputs.learning_list_url }}
          VITE_ENROLLMENTS_API_URL: ${{ needs.deploy-backend.outputs.enrollments_url }}
          VITE_AUTH_API_URL: ${{ needs.deploy-backend.outputs.auth_url }}
